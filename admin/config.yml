backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"
display_url: https://mental8works.netlify.app
locale: 'pt'

collections:
  # --- PÁGINAS EDITÁVEIS ---
  - name: "pages"
    label: "📄 Páginas do Site"
    delete: false
    files:
      - name: "home"
        label: "Página Inicial"
        file: "data/home.json"
        fields:
          - label: "Cabeçalho (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Título Inicial", name: "title_prefix", widget: "string", hint: "Ex: Encontre o seu equilíbrio"}
              - label: "Palavras Animadas (Rotação)"
                name: "words"
                widget: "list"
                allow_add: true
                summary: "{{fields.word}}"
                field: {label: "Palavra", name: "word", widget: "string", hint: "Palavras que mudam no título (ex: interior, mental)"}
              - {label: "Texto de Introdução", name: "subheading", widget: "text", hint: "Texto curto por baixo do título"}
              - {label: "Imagem Principal", name: "image", widget: "image", hint: "Imagem lateral do topo"}
          
          - label: "Secção Missão Social"
            name: "mission"
            widget: "object"
            fields:
              - {label: "O Nosso Manifesto", name: "text", widget: "text", hint: "Texto principal sobre a missão da associação"}
              - label: "Valores em Movimento (Bolhas)"
                name: "bubbles"
                widget: "list"
                field: {label: "Valor/Conceito", name: "val", widget: "string", hint: "Palavras que flutuam na animação (ex: Ética, Humanismo)"}

  # --- CONFIGURAÇÕES GERAIS ---
  - name: "settings"
    label: "⚙️ Configurações Gerais"
    delete: false
    editor:
      preview: false
    files:
      - name: "contacts"
        label: "Contactos e Redes Sociais"
        file: "data/settings.json"
        fields:
          - {label: "Email Oficial", name: "email", widget: "string"}
          - {label: "Telefone de Contacto", name: "phone", widget: "string"}
          - {label: "Morada Completa", name: "address", widget: "string", hint: "Pode usar <br> para quebras de linha"}
          - {label: "Página Facebook (Link)", name: "facebook", widget: "string"}
          - {label: "Página Instagram (Link)", name: "instagram", widget: "string"}
          - {label: "Página LinkedIn (Link)", name: "linkedin", widget: "string"}

  # --- BLOG ---
  - name: "blog"
    label: "✍️ Artigos do Blog"
    folder: "data/blog"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título do Artigo", name: "title", widget: "string"}
      - {label: "Data do Post", name: "date", widget: "datetime"}
      - {label: "Imagem de Destaque", name: "image", widget: "image"}
      - {label: "Resumo Curto", name: "summary", widget: "text", hint: "Aparece na listagem do blog (máx 150 caracteres)"}
      - {label: "Texto Completo", name: "body", widget: "markdown"}
