backend:
  name: github
  repo: SuesteCreative/mental8works-website
  branch: main
  base_url: https://mental8works.pt
  auth_endpoint: /api/auth

media_folder: "assets/images"
public_folder: "/assets/images"
display_url: https://mental8works.pt
locale: 'pt'

collections:
  # ─────────────────────────────────────────────
  #  AUTORES
  # ─────────────────────────────────────────────
  - name: "authors"
    label: "Autores"
    label_singular: "Autor"
    folder: "data/authors"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{role}}"
    fields:
      - {label: "Nome", name: "name", widget: "string"}
      - {label: "Cargo / Especialidade", name: "role", widget: "string"}
      - label: "Fotografia"
        name: "photo"
        widget: "image"
        required: false
        hint: "📷 Formatos aceites: JPG, PNG ou WebP — Tamanho máximo: 2 MB — Dimensões recomendadas: 400 × 400 px (quadrado). Fotografias de rosto centradas resultam melhor com o corte circular do site."
        media_library:
          config:
            max_file_size: 2097152
      - {label: "LinkedIn", name: "linkedin", widget: "string", required: false, hint: "URL completo do perfil LinkedIn (ex: https://www.linkedin.com/in/nome)"}
      - {label: "Biografia curta", name: "bio", widget: "text", required: false, hint: "Breve descrição do autor. Aparece na página do artigo do blog."}

  # ─────────────────────────────────────────────
  #  EQUIPA
  # ─────────────────────────────────────────────
  - name: "team"
    label: "Equipa"
    label_singular: "Membro"
    folder: "data/team"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{role}}"
    fields:
      - {label: "Nome", name: "name", widget: "string"}
      - {label: "Cargo", name: "role", widget: "string"}
      - label: "Fotografia"
        name: "photo"
        widget: "image"
        required: false
        hint: "📷 Formatos aceites: JPG, PNG ou WebP — Tamanho máximo: 2 MB — Dimensões recomendadas: mínimo 400 × 400 px (quadrado). Fotografia de rosto centrada. Evitar fundos com padrões complexos."
        media_library:
          config:
            max_file_size: 2097152
      - {label: "LinkedIn", name: "linkedin", widget: "string", required: false, hint: "URL completo do perfil LinkedIn (ex: https://www.linkedin.com/in/nome)"}
      - label: "Formação / Pontos biográficos"
        name: "bio_items"
        widget: "list"
        label_singular: "Item"
        field: {label: "Item", name: "item", widget: "string"}

  # ─────────────────────────────────────────────
  #  ARTIGOS DO BLOG
  # ─────────────────────────────────────────────
  - name: "blog"
    label: "Artigos do Blog"
    folder: "data/blog"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titulo", name: "title", widget: "string"}
      - {label: "Data", name: "date", widget: "datetime"}
      - {label: "Imagem de Destaque", name: "image", widget: "image"}
      - {label: "Resumo", name: "summary", widget: "text"}
      - label: "Autor"
        name: "author"
        widget: "relation"
        collection: "authors"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name", "role"]
        required: false
        hint: "Selecione um autor existente. Para adicionar um novo, vá à secção 'Autores'."
      - {label: "Conteudo", name: "body", widget: "markdown"}

  # ─────────────────────────────────────────────
  #  PÁGINAS DO SITE
  # ─────────────────────────────────────────────
  - name: "pages"
    label: "Paginas do Site"
    delete: false
    files:
      - name: "home"
        label: "Pagina Inicial"
        file: "data/home.json"
        fields:
          - label: "Cabecalho Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Titulo", name: "title_prefix", widget: "string"}
              - label: "Palavras Animadas"
                name: "words"
                widget: "list"
                field: {label: "Palavra", name: "word", widget: "string"}
              - {label: "Subtitulo", name: "subheading", widget: "text"}
              - {label: "Imagem", name: "image", widget: "image"}
          - label: "Missao"
            name: "mission"
            widget: "object"
            fields:
              - {label: "Texto", name: "text", widget: "text"}
              - label: "Bolhas"
                name: "bubbles"
                widget: "list"
                field: {label: "Valor", name: "val", widget: "string"}

  # ─────────────────────────────────────────────
  #  CONFIGURAÇÕES GERAIS
  # ─────────────────────────────────────────────
  - name: "settings"
    label: "Configuracoes Gerais"
    delete: false
    editor:
      preview: false
    files:
      - name: "contacts"
        label: "Contactos"
        file: "data/settings.json"
        fields:
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Telefone", name: "phone", widget: "string"}
          - {label: "Morada", name: "address", widget: "string"}
          - {label: "Facebook", name: "facebook", widget: "string"}
          - {label: "Instagram", name: "instagram", widget: "string"}
          - {label: "LinkedIn", name: "linkedin", widget: "string"}

