# ── Netlify Configuration ─────────────────────────────────────────────────────

[build]
  publish = "."


# ── Redirects ─────────────────────────────────────────────────────────────────
# Strip .html extensions for clean URLs
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/about-us/index.html"
  to = "/about-us/"
  status = 301

[[redirects]]
  from = "/team/index.html"
  to = "/team/"
  status = 301

[[redirects]]
  from = "/socios/index.html"
  to = "/socios/"
  status = 301

[[redirects]]
  from = "/blog/index.html"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/contactos/index.html"
  to = "/contactos/"
  status = 301

[[redirects]]
  from = "/agendamentos/index.html"
  to = "/agendamentos/"
  status = 301

# ── Security & Performance Headers ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # XSS protection (legacy browsers)
    X-XSS-Protection = "1; mode=block"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions policy
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # HSTS (1 year, include subdomains)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"
