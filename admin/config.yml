backend:
  name: github
  repo: SuesteCreative/mental8works-website
  branch: main
  base_url: https://mental8works.pt
  auth_endpoint: /api/auth

media_folder: "assets/images"
public_folder: "/assets/images"
display_url: https://mental8works.pt
locale: 'pt'

collections:
  # ─────────────────────────────────────────────
  #  AUTORES
  # ─────────────────────────────────────────────
  - name: "authors"
    label: "Autores"
    label_singular: "Autor"
    folder: "data/authors"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{role}}"
    fields:
      - {label: "Nome", name: "name", widget: "string"}
      - {label: "Cargo / Especialidade", name: "role", widget: "string"}
      - label: "Fotografia"
        name: "photo"
        widget: "image"
        required: false
        hint: "📷 Formatos aceites: JPG, PNG ou WebP — Tamanho máximo: 2 MB — Dimensões recomendadas: 400 × 400 px (quadrado). Fotografias de rosto centradas resultam melhor com o corte circular do site."
        media_library:
          config:
            max_file_size: 2097152
      - {label: "LinkedIn", name: "linkedin", widget: "string", required: false, hint: "URL completo do perfil LinkedIn (ex: https://www.linkedin.com/in/nome)"}
      - {label: "Biografia curta", name: "bio", widget: "text", required: false, hint: "Breve descrição do autor. Aparece na página do artigo do blog."}

  # ─────────────────────────────────────────────
  #  EQUIPA
  # ─────────────────────────────────────────────
  - name: "team"
    label: "Equipa"
    label_singular: "Membro"
    folder: "data/equipa"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    identifier_field: "name"
    summary: "{{name}} — {{role}}"
    fields:
      - {label: "Nome", name: "name", widget: "string"}
      - {label: "Cargo", name: "role", widget: "string"}
      - label: "Fotografia"
        name: "photo"
        widget: "image"
        required: false
        hint: "📷 Formatos aceites: JPG, PNG ou WebP — Tamanho máximo: 2 MB — Dimensões recomendadas: mínimo 400 × 400 px (quadrado). Fotografia de rosto centrada. Evitar fundos com padrões complexos."
        media_library:
          config:
            max_file_size: 2097152
      - {label: "LinkedIn", name: "linkedin", widget: "string", required: false, hint: "URL completo do perfil LinkedIn (ex: https://www.linkedin.com/in/nome)"}
      - label: "Formação / Pontos biográficos"
        name: "bio_items"
        widget: "list"
        label_singular: "Item"
        field: {label: "Item", name: "item", widget: "string"}

  # ─────────────────────────────────────────────
  #  ARTIGOS DO BLOG
  # ─────────────────────────────────────────────
  - name: "blog"
    label: "Artigos do Blog"
    folder: "data/blog"
    extension: "json"
    format: "json"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titulo", name: "title", widget: "string"}
      - {label: "Data", name: "date", widget: "datetime"}
      - {label: "Imagem de Destaque", name: "image", widget: "image"}
      - {label: "Resumo", name: "summary", widget: "text"}
      - label: "Autor"
        name: "author"
        widget: "relation"
        collection: "authors"
        search_fields: ["name"]
        value_field: "name"
        display_fields: ["name", "role"]
        required: false
        hint: "Selecione um autor existente. Para adicionar um novo, vá à secção 'Autores'."
      - {label: "Conteudo", name: "body", widget: "markdown"}

  # ─────────────────────────────────────────────
  #  PÁGINAS DO SITE
  # ─────────────────────────────────────────────
  - name: "pages"
    label: "Paginas do Site"
    delete: false
    files:
      - name: "home"
        label: "Pagina Inicial"
        file: "data/home.json"
        fields:
          - label: "Cabecalho Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Titulo", name: "title_prefix", widget: "string"}
              - label: "Palavras Animadas"
                name: "words"
                widget: "list"
                field: {label: "Palavra", name: "word", widget: "string"}
              - {label: "Subtitulo", name: "subheading", widget: "text"}
              - {label: "Imagem", name: "image", widget: "image"}
          - label: "Missao"
            name: "mission"
            widget: "object"
            fields:
              - {label: "Texto", name: "text", widget: "text"}
              - label: "Bolhas"
                name: "bubbles"
                widget: "list"
                field: {label: "Valore", name: "val", widget: "string"}
      - name: "about"
        label: "Pagina Sobre Nós"
        file: "data/about.json"
        fields:
          - label: "Cabecalho"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Titulo", name: "title", widget: "string"}
              - {label: "Subtitulo", name: "lead", widget: "text"}
          - {label: "Imagem Principal", name: "image", widget: "image"}
          - label: "Nossa Historia"
            name: "history"
            widget: "object"
            fields:
              - {label: "Titulo", name: "title", widget: "string"}
              - {label: "Paragrafo 1", name: "text1", widget: "text"}
              - {label: "Paragrafo 2", name: "text2", widget: "text"}
              - {label: "Paragrafo 3", name: "text3", widget: "text"}
          - label: "Componente Social"
            name: "social_component"
            widget: "object"
            fields:
              - {label: "Titulo", name: "title", widget: "string"}
              - {label: "Texto", name: "text", widget: "text"}
      - name: "agendamentos"
        label: "Pagina Agendamentos"
        file: "data/appointments.json"
        fields:
          - {label: "Subtitulo Hero", name: "hero_subtitle", widget: "text"}
          - label: "Preços Psiquiatria"
            name: "psychiatry"
            widget: "object"
            fields:
              - {label: "1ª Consulta", name: "first", widget: "string"}
              - {label: "Seguintes", name: "following", widget: "string"}
              - {label: "Preço Social", name: "social", widget: "string"}
          - label: "Preços Psicologia"
            name: "psychology"
            widget: "object"
            fields:
              - {label: "1ª Consulta", name: "first", widget: "string"}
              - {label: "Seguintes", name: "following", widget: "string"}
              - {label: "Preço Social", name: "social", widget: "string"}
          - label: "Informação Social"
            name: "social_info"
            widget: "object"
            fields:
              - {label: "Titulo", name: "title", widget: "string"}
              - {label: "Texto 1", name: "text1", widget: "text"}
              - {label: "Texto 2", name: "text2", widget: "text"}

          - label: "Perguntas Frequentes (FAQs)"
            name: "faqs"
            widget: "list"
            label_singular: "Pergunta"
            field:
              label: "FAQ"
              name: "faq"
              widget: "object"
              fields:
                - {label: "Pergunta", name: "question", widget: "string"}
                - {label: "Resposta", name: "answer", widget: "markdown"}
      
      - name: "team_settings"
        label: "Configurações da Equipa"
        file: "data/team_settings.json"
        fields:
          - {label: "Página da Equipa Ativa", name: "active", widget: "boolean", default: true, hint: "Se desativado, a página exibirá uma mensagem de 'Em Construção'."}

      - name: "socios"
        label: "Pagina Sócio"
        file: "data/socios.json"
        fields:
          - label: "Cabecalho"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Titulo", name: "title", widget: "string"}
              - {label: "Subtitulo", name: "lead", widget: "text"}
          - label: "O Impacto do seu Apoio"
            name: "impact"
            widget: "object"
            fields:
              - {label: "Titulo", name: "title", widget: "string"}
              - {label: "Paragrafo 1", name: "text1", widget: "text"}
              - {label: "Paragrafo 2", name: "text2", widget: "markdown"}
          - {label: "IBAN p/ Transferencia", name: "iban", widget: "string"}

  # ─────────────────────────────────────────────
  #  CONFIGURAÇÕES GERAIS
  # ─────────────────────────────────────────────
  - name: "settings"
    label: "Configuracoes Gerais"
    delete: false
    editor:
      preview: false
    files:
      - name: "contacts"
        label: "Contactos"
        file: "data/settings.json"
        fields:
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Telefone", name: "phone", widget: "string"}
          - {label: "Morada", name: "address", widget: "string"}
          - {label: "Facebook", name: "facebook", widget: "string"}
          - {label: "Instagram", name: "instagram", widget: "string"}
          - {label: "LinkedIn", name: "linkedin", widget: "string"}

# Deploying to Cloudflare Pages with GitHub OAuth
# Last updated: 2026-02-24
