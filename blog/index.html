<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Mental8Works</title>
    <link rel="icon" type="image/png" href="../assets/images/fav-icon-color.png">

    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/styles.css?v=1.3">

    <!-- CMS Data Bridge -->
    <script src="../assets/js/cms-bridge.js" defer></script>
</head>

<body>
    <!-- Blobs -->
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="menu-overlay"></div>

    <header class="header">
        <div class="container nav-container">
            <a href="../index.html" class="nav-logo-link">
                <img src="../assets/images/logo-mental8works-color.webp" alt="Mental8Works" class="nav-logo-img">
            </a>

            <div class="mobile-toggle">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>

            <nav class="nav-menu">
                <a href="../index.html#services" class="nav-link">Serviços</a>
                <a href="../about-us/index.html" class="nav-link">Sobre Nós</a>
                <a href="../team/index.html" class="nav-link">Equipa</a>
                <a href="../socios/index.html" class="nav-link">Sócio</a>
                <a href="index.html" class="nav-link active">Blog</a>
                <a href="../contactos/index.html" class="nav-link">Contactos</a>
                <a href="../agendamentos/index.html" class="btn btn-primary d-md-none"
                    style="margin-top: 1rem; width: 100%;">Agendar</a>
            </nav>

            <div class="nav-actions d-none d-md-block">
                <a href="../agendamentos/index.html" class="btn btn-primary">Agendar</a>
            </div>
        </div>
    </header>

    <section class="section reveal section-pt-large">
        <div class="container">
            <h1 class="text-center">Blog & Notícias</h1>
            <p class="text-center" style="max-width: 600px; margin: 0 auto 3rem;">
                Artigos, reflexões e novidades sobre saúde mental e bem-estar.
            </p>

            <div class="grid-cards" id="blog-posts-container">
                <!-- Os artigos serão carregados dinamicamente aqui pelo cms-bridge.js -->
                <div class="text-center" style="grid-column: 1/-1; padding: 3rem; opacity: 0.6;">
                    A carregar artigos...
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer reveal">
        <!-- Estrutura do footer carregada pelo cms-bridge.js ou mantida estática -->
        <div class="container">
            <div class="footer-bottom">
                <div style="font-size: 0.75rem; opacity: 0.7;">
                    &copy; 2026 Mental8Works &mdash; designed by
                    <a href="https://sueste-creative.pt/" class="sueste-link">
                        Sueste - Creative Agency
                        <span class="wave-brand">
                            <svg viewBox="0 0 60 10" preserveAspectRatio="none"
                                style="width: 60px; height: 10px; display: inline-block; vertical-align: middle; margin-left: 4px;">
                                <path d="M0 5 Q 7.5 0, 15 5 T 30 5 T 45 5 T 60 5" fill="none" stroke="currentColor"
                                    stroke-width="0.8"></path>
                            </svg>
                        </span>
                    </a>. Todos os direitos reservados.
                </div>
            </div>
        </div>
    </footer>

    <script src="../assets/js/script.js" defer></script>
</body>

</html>
